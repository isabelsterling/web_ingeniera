<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lista de Tareas | Isabel Sterling</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="todo-container">
        <!-- Botón para volver al portafolio -->
        <a href="../../proyectos.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Volver a Proyectos
        </a>

        <div class="todo-card">
            <div class="todo-header">
                <div class="header-icon">
                    <i class="fas fa-check-double"></i>
                </div>
                <div class="header-text">
                    <h1>Lista de Tareas</h1>
                    <p>Organiza tus actividades diarias</p>
                </div>
                <div class="header-stats">
                    <div class="stat-item">
                        <span class="stat-number" id="totalTasks">0</span>
                        <span class="stat-label">Total</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="completedTasks">0</span>
                        <span class="stat-label">Completadas</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="pendingTasks">0</span>
                        <span class="stat-label">Pendientes</span>
                    </div>
                </div>
            </div>

            <!-- Barra de progreso -->
            <div class="progress-section">
                <div class="progress-label">
                    <span>Progreso</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <!-- Formulario para agregar tarea -->
            <div class="add-task-section">
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="¿Qué necesitas hacer?" autocomplete="off">
                    <select id="prioritySelect">
                        <option value="alta">🔴 Alta Prioridad</option>
                        <option value="media" selected>🟡 Media Prioridad</option>
                        <option value="baja">🟢 Baja Prioridad</option>
                    </select>
                    <select id="categorySelect">
                        <option value="personal">👤 Personal</option>
                        <option value="trabajo">💼 Trabajo</option>
                        <option value="estudio">📚 Estudio</option>
                        <option value="hogar">🏠 Hogar</option>
                    </select>
                    <button id="addTaskBtn">
                        <i class="fas fa-plus"></i> Agregar
                    </button>
                </div>
            </div>

            <!-- Filtros y búsqueda -->
            <div class="filters-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">📋 Todas</button>
                    <button class="filter-btn" data-filter="pending">⏳ Pendientes</button>
                    <button class="filter-btn" data-filter="completed">✅ Completadas</button>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar tarea...">
                </div>
            </div>

            <!-- Lista de tareas -->
            <div class="tasks-container">
                <div class="tasks-header">
                    <span><i class="fas fa-tasks"></i> Mis Tareas</span>
                    <button id="clearCompletedBtn" class="clear-completed">
                        <i class="fas fa-trash-alt"></i> Limpiar completadas
                    </button>
                </div>
                <div class="tasks-list" id="tasksList">
                    <!-- Las tareas se renderizan aquí dinámicamente -->
                    <div class="empty-state">
                        <i class="fas fa-clipboard-list"></i>
                        <h3>No hay tareas</h3>
                        <p>Agrega tu primera tarea usando el formulario de arriba</p>
                    </div>
                </div>
            </div>

            <!-- Footer con acciones -->
            <div class="todo-footer">
                <div class="footer-info">
                    <i class="fas fa-database"></i>
                    <span>Las tareas se guardan automáticamente</span>
                </div>
                <button id="deleteAllBtn" class="delete-all">
                    <i class="fas fa-trash-alt"></i> Eliminar todas
                </button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
