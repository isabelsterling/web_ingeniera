<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Planificador Semanal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <a href="../../proyectos.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Volver a Proyectos
        </a>

        <div class="app-card">
            <!-- Header -->
            <div class="app-header">
                <div class="header-icon">
                    <i class="fas fa-calendar-week"></i>
                </div>
                <div class="header-text">
                    <h1>Planificador <span class="gradient-text">Semanal</span></h1>
                    <p>Organiza tus tareas por día</p>
                </div>
                <div class="header-stats">
                    <div class="stat-item">
                        <span class="stat-number" id="totalTasks">0</span>
                        <span class="stat-label">Total</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="completedTasks">0</span>
                        <span class="stat-label">Completadas</span>
                    </div>
                </div>
            </div>

            <!-- Navegación semanal -->
            <div class="week-nav">
                <button class="nav-btn" id="prevWeekBtn">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <h2 id="weekRange">Semana del ...</h2>
                <button class="nav-btn" id="nextWeekBtn">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <button class="today-btn" id="todayBtn">
                    <i class="fas fa-calendar-day"></i> Hoy
                </button>
            </div>

            <!-- Grid de días -->
            <div class="week-grid" id="weekGrid">
                <!-- Generado por JS -->
            </div>

            <!-- Modal para agregar/editar tarea -->
            <div class="modal" id="taskModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modalTitle">Nueva Tarea</h3>
                        <button class="close-modal">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label><i class="fas fa-tag"></i> Título</label>
                            <input type="text" id="taskTitle" placeholder="Ej: Reunión con equipo" maxlength="100">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-align-left"></i> Descripción</label>
                            <textarea id="taskDescription" placeholder="Descripción de la tarea..." rows="2"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group half">
                                <label><i class="fas fa-clock"></i> Hora</label>
                                <input type="time" id="taskTime" value="09:00">
                            </div>
                            <div class="form-group half">
                                <label><i class="fas fa-flag"></i> Prioridad</label>
                                <select id="taskPriority">
                                    <option value="alta">🔴 Alta</option>
                                    <option value="media" selected>🟡 Media</option>
                                    <option value="baja">🟢 Baja</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-palette"></i> Color</label>
                            <div class="color-options">
                                <button class="color-btn active" data-color="#6C63FF" style="background: #6C63FF;"></button>
                                <button class="color-btn" data-color="#FF6584" style="background: #FF6584;"></button>
                                <button class="color-btn" data-color="#28A745" style="background: #28A745;"></button>
                                <button class="color-btn" data-color="#FFC107" style="background: #FFC107;"></button>
                                <button class="color-btn" data-color="#17A2B8" style="background: #17A2B8;"></button>
                                <button class="color-btn" data-color="#6F42C1" style="background: #6F42C1;"></button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="taskCompleted">
                                <i class="fas fa-check-circle"></i> Marcar como completada
                            </label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="cancel-btn">Cancelar</button>
                        <button class="delete-task-btn" id="deleteTaskBtn" style="display: none;">
                            <i class="fas fa-trash-alt"></i> Eliminar
                        </button>
                        <button class="save-btn" id="saveTaskBtn">
                            <i class="fas fa-save"></i> Guardar
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="app-footer">
                <p>
                    <i class="fas fa-info-circle"></i>
                    Arrastra las tareas entre días para reorganizarlas. Haz clic en una tarea para editarla.
                </p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
