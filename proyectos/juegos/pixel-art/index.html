<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎨 Pixel Art | Isabel Sterling</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-wrapper">
        <!-- Botón para volver -->
        <a href="../../juegos/index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Volver a Juegos
        </a>

        <div class="game-container">
            <!-- Header -->
            <div class="game-header">
                <div class="game-title">
                    <div class="title-icon">🎨</div>
                    <div>
                        <h1>Pixel Art</h1>
                        <p class="subtitle">Dibuja como en Minecraft</p>
                    </div>
                </div>
                <div class="game-controls">
                    <button class="control-btn" id="clearBtn" title="Limpiar">
                        <i class="fas fa-eraser"></i>
                    </button>
                    <button class="control-btn" id="undoBtn" title="Deshacer">
                        <i class="fas fa-undo-alt"></i>
                    </button>
                    <button class="control-btn" id="saveBtn" title="Guardar">
                        <i class="fas fa-save"></i>
                    </button>
                    <button class="control-btn" id="exportBtn" title="Exportar PNG">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>

            <!-- Tamaño del grid -->
            <div class="size-controls">
                <span class="size-label">Tamaño:</span>
                <button class="size-btn active" data-size="16">16x16</button>
                <button class="size-btn" data-size="24">24x24</button>
                <button class="size-btn" data-size="32">32x32</button>
                <button class="size-btn" data-size="48">48x48</button>
            </div>

            <!-- Canvas y paleta -->
            <div class="canvas-wrapper">
                <div class="pixel-canvas-container">
                    <canvas id="pixelCanvas"></canvas>
                    <div class="grid-overlay" id="gridOverlay"></div>
                </div>
            </div>

            <!-- Paleta de colores -->
            <div class="color-palette">
                <div class="palette-colors" id="colorPalette">
                    <!-- Colores generados por JS -->
                </div>
                <div class="color-tools">
                    <button class="tool-btn active" data-tool="pencil" title="Lápiz">
                        <i class="fas fa-pencil-alt"></i>
                    </button>
                    <button class="tool-btn" data-tool="eraser" title="Borrador">
                        <i class="fas fa-eraser"></i>
                    </button>
                    <button class="tool-btn" data-tool="fill" title="Rellenar">
                        <i class="fas fa-fill-drip"></i>
                    </button>
                    <button class="tool-btn" data-tool="picker" title="Selector de color">
                        <i class="fas fa-eye-dropper"></i>
                    </button>
                </div>
                <div class="selected-color" id="selectedColor">
                    <span class="color-label">Color</span>
                    <div class="color-preview" id="colorPreview" style="background: #6C63FF;"></div>
                    <span class="color-hex" id="colorHex">#6C63FF</span>
                </div>
            </div>

            <!-- Información adicional -->
            <div class="pixel-info">
                <span id="pixelCount">Píxeles: 0</span>
                <span id="pixelPosition">Posición: (0, 0)</span>
            </div>

            <!-- Footer -->
            <div class="game-footer">
                <p>
                    <i class="fas fa-info-circle"></i>
                    Haz clic para pintar, arrastra para dibujar. ¡Crea tus propias obras de arte pixeladas!
                </p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
