<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎂 Agenda de Cumpleaños</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <a href="../../proyectos.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Volver a Proyectos
        </a>

        <div class="app-card">
            <!-- Header -->
            <div class="app-header">
                <div class="header-icon">
                    <i class="fas fa-birthday-cake"></i>
                </div>
                <div class="header-text">
                    <h1>Agenda de <span class="gradient-text">Cumpleaños</span></h1>
                    <p>No olvides ningún cumpleaños importante</p>
                </div>
                <div class="header-stats">
                    <div class="stat-item">
                        <span class="stat-number" id="totalBirthdays">0</span>
                        <span class="stat-label">Total</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="birthdaysThisMonth">0</span>
                        <span class="stat-label">Este mes</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="upcomingBirthdays">0</span>
                        <span class="stat-label">Próximos</span>
                    </div>
                </div>
            </div>

            <!-- Barra de acciones -->
            <div class="actions-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar por nombre...">
                </div>
                <button class="new-birthday-btn" id="newBirthdayBtn">
                    <i class="fas fa-plus"></i> Agregar Cumpleaños
                </button>
            </div>

            <!-- Filtros por mes -->
            <div class="month-filters">
                <button class="month-btn active" data-month="all">📅 Todos</button>
                <button class="month-btn" data-month="0">Ene</button>
                <button class="month-btn" data-month="1">Feb</button>
                <button class="month-btn" data-month="2">Mar</button>
                <button class="month-btn" data-month="3">Abr</button>
                <button class="month-btn" data-month="4">May</button>
                <button class="month-btn" data-month="5">Jun</button>
                <button class="month-btn" data-month="6">Jul</button>
                <button class="month-btn" data-month="7">Ago</button>
                <button class="month-btn" data-month="8">Sep</button>
                <button class="month-btn" data-month="9">Oct</button>
                <button class="month-btn" data-month="10">Nov</button>
                <button class="month-btn" data-month="11">Dic</button>
            </div>

            <!-- Lista de cumpleaños -->
            <div class="birthdays-container">
                <div class="birthdays-list" id="birthdaysList">
                    <!-- Generado por JS -->
                </div>
            </div>

            <!-- Modal para agregar/editar cumpleaños -->
            <div class="modal" id="birthdayModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modalTitle">Agregar Cumpleaños</h3>
                        <button class="close-modal">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Nombre</label>
                            <input type="text" id="personName" placeholder="Ej: Juan Pérez" maxlength="50">
                        </div>
                        <div class="form-row">
                            <div class="form-group half">
                                <label><i class="fas fa-calendar-day"></i> Día</label>
                                <select id="birthDay">
                                    <!-- Generado por JS -->
                                </select>
                            </div>
                            <div class="form-group half">
                                <label><i class="fas fa-calendar-alt"></i> Mes</label>
                                <select id="birthMonth">
                                    <option value="0">Enero</option>
                                    <option value="1">Febrero</option>
                                    <option value="2">Marzo</option>
                                    <option value="3">Abril</option>
                                    <option value="4">Mayo</option>
                                    <option value="5">Junio</option>
                                    <option value="6">Julio</option>
                                    <option value="7">Agosto</option>
                                    <option value="8">Septiembre</option>
                                    <option value="9">Octubre</option>
                                    <option value="10">Noviembre</option>
                                    <option value="11">Diciembre</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-palette"></i> Color</label>
                            <div class="color-options">
                                <button class="color-btn active" data-color="#FF6584" style="background: #FF6584;"></button>
                                <button class="color-btn" data-color="#6C63FF" style="background: #6C63FF;"></button>
                                <button class="color-btn" data-color="#28A745" style="background: #28A745;"></button>
                                <button class="color-btn" data-color="#FFC107" style="background: #FFC107;"></button>
                                <button class="color-btn" data-color="#17A2B8" style="background: #17A2B8;"></button>
                                <button class="color-btn" data-color="#6F42C1" style="background: #6F42C1;"></button>
                                <button class="color-btn" data-color="#FD7E14" style="background: #FD7E14;"></button>
                                <button class="color-btn" data-color="#E83E8C" style="background: #E83E8C;"></button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-bell"></i> Recordatorio</label>
                            <div class="reminder-options">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="sendReminder">
                                    <i class="fas fa-bell"></i> Activar recordatorio
                                </label>
                                <select id="reminderDays" style="width: auto; display: inline-block; margin-left: 10px;">
                                    <option value="1">1 día antes</option>
                                    <option value="3" selected>3 días antes</option>
                                    <option value="7">7 días antes</option>
                                    <option value="14">14 días antes</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-sticky-note"></i> Nota</label>
                            <textarea id="personNote" placeholder="Regalo, comida favorita, etc..." rows="2"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="cancel-btn">Cancelar</button>
                        <button class="delete-birthday-btn" id="deleteBirthdayBtn" style="display: none;">
                            <i class="fas fa-trash-alt"></i> Eliminar
                        </button>
                        <button class="save-btn" id="saveBirthdayBtn">
                            <i class="fas fa-save"></i> Guardar
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="app-footer">
                <p>
                    <i class="fas fa-info-circle"></i>
                    Recuerda todos los cumpleaños importantes. ¡Nunca olvides felicitar a tus seres queridos!
                </p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
