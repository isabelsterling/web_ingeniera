<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6584;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fondo -->
  <circle cx="32" cy="32" r="30" fill="url(#logoGrad)" opacity="0.12"/>
  
  <!-- Anillo decorativo -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#logoGrad)" stroke-width="2" opacity="0.3"/>
  
  <!-- Anillo exterior más sutil -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#logoGrad)" stroke-width="1" opacity="0.1"/>
  
  <!-- Iniciales IS -->
  <text x="32" y="41" font-family="'Inter', 'Segoe UI', sans-serif" font-size="30" font-weight="800" text-anchor="middle" fill="url(#logoGrad)" letter-spacing="-1.5">
    IS
  </text>
</svg>